name: release

# Releases the ADMIN app. Triggered by pushing an admin version tag, e.g.:
#   git tag v1.2.3 && git push origin v1.2.3
#
# This is a monorepo: the per-server agent is released separately on `agent/v*`
# tags (see release-agent.yml). The `v*` and `agent/v*` globs are disjoint —
# GitHub Actions' `*` doesn't cross `/`, so `v*` never matches `agent/v1.2.3`.
#
# Produces, all attached to the same GitHub Release for the tag:
#   - awg-admin (standalone web server): linux/darwin/windows, amd64/arm64
#     archives — built by GoReleaser (see .goreleaser.yaml).
#   - the awg-admin multi-arch (amd64+arm64) Docker image pushed to GHCR — also
#     built by GoReleaser.
#   - the Wails desktop app for Windows (.exe + NSIS installer), macOS
#     (.app + .dmg, universal binary) and Linux (binary).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the release / upload assets
  packages: write # push to ghcr.io

env:
  GOEXPERIMENT: jsonv2

jobs:
  # ---------------------------------------------------------------------
  # Everything GoReleaser owns for the admin: the awg-admin binaries,
  # archives, checksums, changelog, the GitHub Release, and the multi-arch
  # awg-admin Docker image pushed to GHCR (see the dockers_v2 pipe in
  # .goreleaser.yaml).
  # ---------------------------------------------------------------------
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history for the changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Docker image name must be lowercase; GHCR is keyed off the repo owner.
      - name: Compute image name (lowercase)
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_ADMIN=ghcr.io/$owner/awg-admin" >> "$GITHUB_ENV"

      # arm64 images are built under QEMU emulation via buildx (use: buildx).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------
  # Wails desktop app, one job per target OS (the webview bindings can
  # only be built on their own platform). Uploaded to the release created
  # by the goreleaser job above, so it must run after it.
  # ---------------------------------------------------------------------
  desktop:
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        include:
          # wailsflags: per-platform extra flags for `wails build`.
          #  - Windows: -nsis (the NSIS installer is Windows-only; `wails build
          #    -nsis` errors "cannot build nsis installer - no windows targets"
          #    on any non-Windows build).
          #  - Linux: -tags webkit2_41 — ubuntu-latest (24.04) ships
          #    webkit2gtk-4.1, but Wails defaults to pkg-config webkit2gtk-4.0
          #    (not present) unless this tag selects the 4.1 path.
          - os: windows-latest
            platform: windows/amd64
            wailsflags: "-nsis"
          - os: macos-latest
            platform: darwin/universal
            wailsflags: ""
          - os: ubuntu-latest
            platform: linux/amd64
            wailsflags: "-tags webkit2_41"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux GTK/webkit build deps
        if: runner.os == 'Linux'
        # libsoup-3.0-dev: the webkit2_41 build path pkg-configs
        # `webkit2gtk-4.1 libsoup-3.0` (normally pulled in by libwebkit2gtk-4.1-dev,
        # installed explicitly to be safe).
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        # `wails build -nsis` only shells out to `makensis`; if it isn't on PATH
        # Wails logs "Warning: Cannot create installer: makensis not found" and
        # STILL exits 0 (nsis_installer.go), so the installer silently vanishes
        # from the release (as it did in v1.1.0). choco installs NSIS to Program
        # Files but does NOT add it to PATH, so put it there for the build step
        # and fail loudly if makensis is missing.
        run: |
          choco install nsis -y --no-progress
          $nsis = 'C:\Program Files (x86)\NSIS'
          Add-Content -Path $env:GITHUB_PATH -Value $nsis
          if (-not (Test-Path "$nsis\makensis.exe")) {
            throw "makensis.exe not found under $nsis after 'choco install nsis'"
          }

      - name: Build desktop app
        # -ldflags stamps main.version so the app shows it on the Settings page
        # (main.go's version var). github.ref_name is the admin tag, already
        # `v1.0.0` (with the leading v), so pass it through as-is.
        run: go tool wails build -platform ${{ matrix.platform }} ${{ matrix.wailsflags }} -trimpath -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Verify NSIS installer was produced
        if: runner.os == 'Windows'
        shell: pwsh
        # Guard against the silent-skip above ever regressing: `wails build
        # -nsis` writes ${name}-${arch}-installer.exe (name = wails.json "name"),
        # so for windows/amd64 that's amnezia-wg-admin-amd64-installer.exe.
        run: |
          $installer = 'build/bin/amnezia-wg-admin-amd64-installer.exe'
          if (-not (Test-Path $installer)) {
            throw "Expected NSIS installer '$installer' was not produced by 'wails build -nsis'"
          }
          Write-Host "OK: $installer"

      - name: Package macOS .dmg (drag-to-Applications layout)
        if: runner.os == 'macOS'
        # Wails leaves an unsigned build/bin/amnezia-wg-admin.app. Here we:
        #  1. rename the bundle to "Amnezia-WG Admin.app" so it appears under
        #     that name in /Applications (the executable inside stays
        #     amnezia-wg-admin — CFBundleExecutable is unchanged);
        #  2. ad-hoc codesign it — an *unsigned* arm64 app is refused as
        #     "damaged" on Apple Silicon; ad-hoc signing lets it launch. This
        #     does NOT remove Gatekeeper's "unidentified developer" prompt —
        #     users bypass that once (right-click → Open, or `xattr -cr`; see
        #     README/GUIDE). To ship a fully-trusted build later, replace
        #     `--sign -` with a "Developer ID Application: …" identity and add
        #     an `xcrun notarytool submit … && xcrun stapler staple` step here
        #     (needs a paid Apple Developer account + GitHub secrets for the
        #     .p12 cert, its password and the notarization credentials);
        #  3. build a JetBrains-style .dmg — the app icon and an /Applications
        #     drop-link side by side in one Finder window (drag the icon across
        #     to install) — via create-dmg instead of a bare hdiutil image.
        run: |
          set -euo pipefail
          brew install create-dmg

          bundle="Amnezia-WG Admin.app"
          mv "build/bin/amnezia-wg-admin.app" "build/bin/$bundle"
          codesign --force --deep --sign - "build/bin/$bundle"

          # create-dmg images a whole folder — stage just the app so nothing
          # else in build/bin leaks into the image.
          staging="$(mktemp -d)"
          cp -R "build/bin/$bundle" "$staging/"

          # Retry: create-dmg drives Finder over AppleScript to lay out the
          # window, which occasionally flakes on the headless runner.
          for attempt in 1 2 3; do
            if create-dmg \
                --volname "Amnezia-WG Admin" \
                --volicon "build/bin/$bundle/Contents/Resources/iconfile.icns" \
                --window-pos 200 120 \
                --window-size 640 400 \
                --icon-size 120 \
                --icon "$bundle" 160 190 \
                --hide-extension "$bundle" \
                --app-drop-link 480 190 \
                --no-internet-enable \
                "build/bin/amnezia-wg-admin.dmg" \
                "$staging"; then
              break
            fi
            echo "create-dmg attempt $attempt failed"
            rm -f "build/bin/amnezia-wg-admin.dmg"
            [ "$attempt" = 3 ] && exit 1
          done

          # Remove the .app so the upload glob (build/bin/amnezia-wg-admin*)
          # doesn't try to upload a directory ("read ...app: is a directory").
          rm -rf "build/bin/$bundle" "$staging"

      - name: Rename artifacts with version
        shell: bash
        run: |
          cd build/bin
          tag='${{ github.ref_name }}'
          for f in amnezia-wg-admin.exe amnezia-wg-admin-amd64-installer.exe amnezia-wg-admin.dmg amnezia-wg-admin; do
            [ -f "$f" ] || continue
            ext="${f##*.}"
            base="${f%.*}"
            [ "$ext" = "$f" ] && ext='' # no extension (plain Linux binary)
            if [ -n "$ext" ]; then
              mv "$f" "${base}_${tag}.${ext}"
            else
              mv "$f" "${f}_${tag}"
            fi
          done

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" build/bin/amnezia-wg-admin* --clobber
