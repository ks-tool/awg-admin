name: release

# Triggered by pushing a version tag, e.g.:
#   git tag v1.2.3 && git push origin v1.2.3
#
# Produces, all attached to the same GitHub Release for the tag:
#   - awg-admin (standalone web server): linux/darwin/windows, amd64/arm64
#     archives — built by GoReleaser (see .goreleaser.yaml).
#   - awg-agent (kernel/amneziawg-dkms) and awg-agent-userspace
#     (userspace/amneziawg-go): linux only, amd64/arm64 — built by GoReleaser.
#   - multi-arch (amd64+arm64) Docker images pushed to GHCR — the standalone
#     server and the userspace agent — also built by GoReleaser.
#   - the Wails desktop app for Windows (.exe + NSIS installer), macOS
#     (.app + .dmg, universal binary) and Linux (binary).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the release / upload assets
  packages: write # push to ghcr.io

env:
  GOEXPERIMENT: jsonv2

jobs:
  # ---------------------------------------------------------------------
  # Everything GoReleaser owns: awg-admin + awg-agent + awg-agent-userspace
  # binaries, archives, checksums, changelog, the GitHub Release, and the
  # multi-arch Docker images (standalone server + userspace agent) pushed
  # to GHCR (see the dockers/docker_manifests pipes in .goreleaser.yaml).
  # ---------------------------------------------------------------------
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history for the changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Docker image names must be lowercase; GHCR is keyed off the repo owner.
      - name: Compute image names (lowercase)
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_ADMIN=ghcr.io/$owner/awg-admin" >> "$GITHUB_ENV"
          echo "IMAGE_AGENT_USERSPACE=ghcr.io/$owner/awg-agent-userspace" >> "$GITHUB_ENV"

      # arm64 images are built under QEMU emulation via buildx (use: buildx).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------
  # Wails desktop app, one job per target OS (the webview bindings can
  # only be built on their own platform). Uploaded to the release created
  # by the goreleaser job above, so it must run after it.
  # ---------------------------------------------------------------------
  desktop:
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
          - os: macos-latest
            platform: darwin/universal
          - os: ubuntu-latest
            platform: linux/amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux GTK/webkit build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Build desktop app
        run: go tool wails build -platform ${{ matrix.platform }} -nsis -trimpath

      - name: Package macOS .dmg
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "Amnezia Admin" \
            -srcfolder build/bin/amnezia-admin.app \
            -ov -format UDZO build/bin/amnezia-admin.dmg

      - name: Rename artifacts with version
        shell: bash
        run: |
          cd build/bin
          tag='${{ github.ref_name }}'
          for f in amnezia-admin.exe amnezia-admin-amd64-installer.exe amnezia-admin.dmg amnezia-admin; do
            [ -f "$f" ] || continue
            ext="${f##*.}"
            base="${f%.*}"
            [ "$ext" = "$f" ] && ext='' # no extension (plain Linux binary)
            if [ -n "$ext" ]; then
              mv "$f" "${base}_${tag}.${ext}"
            else
              mv "$f" "${f}_${tag}"
            fi
          done

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" build/bin/amnezia-admin* --clobber
