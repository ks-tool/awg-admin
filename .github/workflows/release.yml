name: release

# Releases the ADMIN app. Triggered by pushing an admin version tag, e.g.:
#   git tag v1.2.3 && git push origin v1.2.3
#
# This is a monorepo: the per-server agent is released separately on `agent/v*`
# tags (see release-agent.yml). The `v*` and `agent/v*` globs are disjoint —
# GitHub Actions' `*` doesn't cross `/`, so `v*` never matches `agent/v1.2.3`.
#
# Produces, all attached to the same GitHub Release for the tag:
#   - awg-admin (standalone web server): linux/darwin/windows, amd64/arm64
#     archives — built by GoReleaser (see .goreleaser.yaml).
#   - the awg-admin multi-arch (amd64+arm64) Docker image pushed to GHCR — also
#     built by GoReleaser.
#   - the Wails desktop app for Windows (.exe + NSIS installer), macOS
#     (.app + .dmg, universal binary) and Linux (binary).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the release / upload assets
  packages: write # push to ghcr.io

env:
  GOEXPERIMENT: jsonv2

jobs:
  # ---------------------------------------------------------------------
  # Everything GoReleaser owns for the admin: the awg-admin binaries,
  # archives, checksums, changelog, the GitHub Release, and the multi-arch
  # awg-admin Docker image pushed to GHCR (see the dockers_v2 pipe in
  # .goreleaser.yaml).
  # ---------------------------------------------------------------------
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history for the changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Docker image name must be lowercase; GHCR is keyed off the repo owner.
      - name: Compute image name (lowercase)
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_ADMIN=ghcr.io/$owner/awg-admin" >> "$GITHUB_ENV"

      # arm64 images are built under QEMU emulation via buildx (use: buildx).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------
  # Wails desktop app, one job per target OS (the webview bindings can
  # only be built on their own platform). Uploaded to the release created
  # by the goreleaser job above, so it must run after it.
  # ---------------------------------------------------------------------
  desktop:
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        include:
          # nsis: the NSIS installer is Windows-only — `wails build -nsis` errors
          # ("cannot build nsis installer - no windows targets") on any non-Windows
          # build, so it's passed only for the Windows target.
          - os: windows-latest
            platform: windows/amd64
            nsis: "-nsis"
          - os: macos-latest
            platform: darwin/universal
            nsis: ""
          - os: ubuntu-latest
            platform: linux/amd64
            nsis: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux GTK/webkit build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Build desktop app
        run: go tool wails build -platform ${{ matrix.platform }} ${{ matrix.nsis }} -trimpath

      - name: Package macOS .dmg
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "Amnezia Admin" \
            -srcfolder build/bin/amnezia-admin.app \
            -ov -format UDZO build/bin/amnezia-admin.dmg

      - name: Rename artifacts with version
        shell: bash
        run: |
          cd build/bin
          tag='${{ github.ref_name }}'
          for f in amnezia-admin.exe amnezia-admin-amd64-installer.exe amnezia-admin.dmg amnezia-admin; do
            [ -f "$f" ] || continue
            ext="${f##*.}"
            base="${f%.*}"
            [ "$ext" = "$f" ] && ext='' # no extension (plain Linux binary)
            if [ -n "$ext" ]; then
              mv "$f" "${base}_${tag}.${ext}"
            else
              mv "$f" "${f}_${tag}"
            fi
          done

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" build/bin/amnezia-admin* --clobber
