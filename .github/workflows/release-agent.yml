name: release-agent

# Releases the per-server AGENT. Triggered by pushing an agent version tag with
# the `agent/` prefix, e.g.:
#   git tag agent/v1.2.3 && git push origin agent/v1.2.3
#
# This is a monorepo: the admin app is released separately on `v*` tags (see
# release.yml). The `v*` and `agent/v*` globs are disjoint — GitHub Actions' `*`
# doesn't cross `/`, so this workflow never fires for a plain `v*` admin tag.
# GoReleaser's native tag-prefix stripping is Pro-only, so we do it by hand:
# export AGENT_VERSION (the tag with `agent/v` stripped) for the version
# templates and run with --skip=validate (the prefixed tag isn't valid semver).
# The release is still created on the real `agent/v*` tag. See the header of
# .goreleaser.agent.yaml for the full story.
#
# Produces, attached to the GitHub Release for the tag:
#   - awg-agent (kernel/amneziawg-dkms) and awg-agent-userspace
#     (userspace/amneziawg-go): linux only, amd64/arm64 archives.
#   - the awg-agent-userspace multi-arch (amd64+arm64) Docker image on GHCR.
on:
  push:
    tags:
      - "agent/v*"

permissions:
  contents: write # create the release / upload assets
  packages: write # push to ghcr.io

env:
  GOEXPERIMENT: jsonv2

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history for the changelog + previous agent/v* tag

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod # the agent is its own module (agent/go.mod)

      # Strip the "agent/v" prefix to a clean semver for the version templates
      # (GoReleaser's .Version is the raw "agent/v1.2.3" and would put a "/" in
      # names). Point the changelog at the previous agent/v* tag so it doesn't
      # span admin v* tags. Docker image name must be lowercase (GHCR).
      - name: Compute version, previous tag and image name
        run: |
          cur='${{ github.ref_name }}'                 # agent/v1.2.3
          echo "AGENT_VERSION=${cur#agent/v}" >> "$GITHUB_ENV"   # 1.2.3
          prev=$(git tag -l 'agent/v*' --sort=-version:refname | grep -vxF "$cur" | head -n1)
          [ -n "$prev" ] && echo "GORELEASER_PREVIOUS_TAG=$prev" >> "$GITHUB_ENV"
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_AGENT_USERSPACE=ghcr.io/$owner/awg-agent-userspace" >> "$GITHUB_ENV"

      # arm64 image is built under QEMU emulation via buildx.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # --skip=validate: the agent/v* tag isn't valid semver, so GoReleaser's
          # validate step would reject it (see .goreleaser.agent.yaml header).
          args: release --clean --skip=validate --config .goreleaser.agent.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
