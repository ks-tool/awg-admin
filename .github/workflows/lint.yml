name: lint

# Runs golangci-lint on pull requests, against both Go modules in this repo
# (root module + agent/, joined via go.work — golangci-lint lints one
# module at a time, hence the matrix).
on:
  pull_request:

permissions:
  contents: read

env:
  GOEXPERIMENT: jsonv2

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [".", "agent"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod

      - uses: golangci/golangci-lint-action@v7
        with:
          working-directory: ${{ matrix.module }}
          version: latest
