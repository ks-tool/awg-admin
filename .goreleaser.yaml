# GoReleaser config for awg-admin's pure-Go binaries and their Docker images:
#   - awg-admin: the standalone web server (cmd/awg-admin.go), embeds the
#     built frontend (see the "before.hooks" below) — linux/darwin/windows,
#     amd64/arm64.
#   - awg-agent: the per-server daemon (agent/cmd/awg-agent.go), kernel/
#     amneziawg-dkms backend — linux only, amd64 and arm64.
#   - awg-agent-userspace: the same daemon built to drive a userspace
#     amneziawg-go process per interface (agent/cmd/awg-agent-userspace) —
#     linux only, amd64 and arm64.
#
# Docker images (linux amd64+arm64, pushed to GHCR) are built here via the
# `dockers_v2` pipe from prebuilt binaries:
#   - {IMAGE_ADMIN}: the standalone server (frontend already embedded in the
#     awg-admin binary, so the image just copies it).
#   - {IMAGE_AGENT_USERSPACE}: the userspace agent, bundling amneziawg-go +
#     iproute2/iptables (see docker/Dockerfile.agent).
# IMAGE_ADMIN / IMAGE_AGENT_USERSPACE are set by the release workflow (the
# lowercased GHCR image names); the amd64 build runs on the CI runner and the
# arm64 one under buildx+QEMU (`use: buildx`).
#
# Deliberately NOT handled here:
#   - The Wails desktop app (Windows/macOS/Linux): needs the `wails` CLI,
#     platform-specific packaging (NSIS installer, .dmg) and to run on each
#     target OS's own runner — handled as separate jobs in
#     .github/workflows/release.yml, which upload their artifacts to the
#     same GitHub release this config creates.
version: 2

project_name: awg-admin

before:
  hooks:
    - sh -c "cd frontend && npm ci"
    - make frontend

builds:
  - id: admin
    main: ./cmd/awg-admin.go
    binary: awg-admin
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=jsonv2
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

  - id: agent
    dir: agent
    main: ./cmd/awg-agent.go
    binary: awg-agent
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=jsonv2
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

  - id: agent-userspace
    dir: agent
    main: ./cmd/awg-agent-userspace
    binary: awg-agent-userspace
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=jsonv2
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: admin-archive
    ids: [admin]
    name_template: >-
      awg-admin_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

  - id: agent-archive
    ids: [agent]
    name_template: >-
      awg-agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]

  - id: agent-userspace-archive
    ids: [agent-userspace]
    name_template: >-
      awg-agent-userspace_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]

# Multi-arch images from prebuilt binaries (the modern dockers_v2 pipe: one
# entry builds every platform and its manifest in a single buildx pass). The
# Dockerfiles COPY the binary GoReleaser drops into the build context; the
# userspace one additionally compiles amneziawg-go in a builder stage. arm64
# is built under buildx+QEMU.
dockers_v2:
  - id: admin
    ids: [admin]
    dockerfile: docker/Dockerfile.admin
    images:
      - "{{ .Env.IMAGE_ADMIN }}"
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.version: "{{ .Version }}"

  - id: agent-userspace
    ids: [agent-userspace]
    dockerfile: docker/Dockerfile.agent
    images:
      - "{{ .Env.IMAGE_AGENT_USERSPACE }}"
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.version: "{{ .Version }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  # github.owner/name are left unset — GoReleaser auto-detects the repo
  # from the `origin` git remote in CI.
  #
  # The desktop-build jobs in .github/workflows/release.yml run after this
  # and upload more assets (Wails apps, installers) to the very same
  # release via `gh release upload`, so it must already exist and stay
  # editable rather than be (re)published as final by some other step.
  mode: keep-existing
