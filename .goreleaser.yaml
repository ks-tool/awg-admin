# GoReleaser config for the awg-admin RELEASE — the root module's admin app.
# Triggered by a `v*` tag (see .github/workflows/release.yml).
#
# This is a MONOREPO: the per-server agent is released separately, on `agent/v*`
# tags, by .goreleaser.agent.yaml + .github/workflows/release-agent.yml. This
# config therefore builds ONLY the admin:
#   - awg-admin: the standalone web server (cmd/awg-admin.go), embeds the built
#     frontend (see the "before.hooks") — linux/darwin/windows, amd64/arm64.
#   - {IMAGE_ADMIN}: its multi-arch Docker image (linux amd64+arm64, GHCR), the
#     frontend already embedded so the image just copies the binary
#     (docker/Dockerfile.admin). IMAGE_ADMIN is set by the release workflow (the
#     lowercased GHCR image name); arm64 is built under buildx+QEMU.
#
# Deliberately NOT handled here:
#   - awg-agent / awg-agent-userspace: released on `agent/v*` (see above).
#   - The Wails desktop app (Windows/macOS/Linux): needs the `wails` CLI and to
#     run on each target OS's own runner — separate jobs in release.yml that
#     upload their artifacts to the same GitHub release this config creates
#     (hence release.mode: keep-existing).
version: 2

project_name: awg-admin

before:
  hooks:
    - sh -c "cd frontend && npm ci"
    - make frontend

builds:
  - id: admin
    main: ./cmd/awg-admin.go
    binary: awg-admin
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=jsonv2
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: admin-archive
    ids: [admin]
    name_template: >-
      awg-admin_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

# Multi-arch image from the prebuilt binary (the modern dockers_v2 pipe: one
# entry builds every platform and its manifest in a single buildx pass). The
# Dockerfile COPYs the binary GoReleaser drops into the build context. arm64 is
# built under buildx+QEMU.
dockers_v2:
  - id: admin
    ids: [admin]
    dockerfile: docker/Dockerfile.admin
    images:
      - "{{ .Env.IMAGE_ADMIN }}"
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.version: "{{ .Version }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  # github.owner/name are left unset — GoReleaser auto-detects the repo
  # from the `origin` git remote in CI.
  #
  # The desktop-build jobs in .github/workflows/release.yml run after this
  # and upload more assets (Wails apps, installers) to the very same
  # release via `gh release upload`, so it must already exist and stay
  # editable rather than be (re)published as final by some other step.
  mode: keep-existing
